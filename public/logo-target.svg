<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 165" width="500" height="165">
  <defs>
    <linearGradient id="metalMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0e0e0"/>
      <stop offset="20%"  stop-color="#ffffff"/>
      <stop offset="42%"  stop-color="#c0c0c0"/>
      <stop offset="55%"  stop-color="#989898"/>
      <stop offset="70%"  stop-color="#d0d0d0"/>
      <stop offset="85%"  stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <linearGradient id="metalSub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cccccc"/>
      <stop offset="50%"  stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#555555" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#999999"/>
      <stop offset="65%"  stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- TARGET -->
  <text
    x="250"
    y="85"
    font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
    font-size="88"
    font-weight="900"
    letter-spacing="5"
    text-anchor="middle"
    fill="url(#metalMain)"
    filter="url(#shadow)"
  >TARGET</text>

  <!-- INSTITUTE centralizado -->
  <text
    x="250"
    y="120"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#metalSub)"
  >INSTITUTE</text>

  <!-- Seta abaixo do INSTITUTE -->
  <line x1="20" y1="140" x2="452" y2="140" stroke="#cccccc" stroke-width="4"/>
  <polygon points="452,128 484,140 452,152" fill="#cccccc"/>
</svg>
